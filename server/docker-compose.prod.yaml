# Production compose for the Butler mem0 fork.
#
# Differs from docker-compose.yaml (dev) in three deliberate ways:
#   1. Pulls the pre-built registry image instead of building dev.Dockerfile.
#   2. Does NOT mount the repo (no `.:/app`) — the image already contains the
#      local mem0 with the fork's fixes (baked in via prod.Dockerfile).
#   3. Startup is just `alembic upgrade head && uvicorn …` — NO
#      `rm -rf /app/packages` / `pip --force-reinstall mem0ai` / `--reload`.
#      That dev command would delete the baked-in fork and pull buggy PyPI mem0.
#
# Build/push the image first (from the repo root):
#   docker build -f server/prod.Dockerfile -t registry.digitalocean.com/monorail-frontend/mem0-fork:latest .
#   docker push registry.digitalocean.com/monorail-frontend/mem0-fork:latest
# Then, from this dir:  docker compose -f docker-compose.prod.yaml up -d
# First run only, create the admin user / API key:  make seed   (or the dashboard wizard)

name: mem0-prod

services:
  mem0:
    image: registry.digitalocean.com/monorail-frontend/mem0-fork:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8888:8000"
    env_file:
      - .env
    networks:
      - mem0_network
    volumes:
      - ./history:/app/history    # persist history only — do NOT mount the repo
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations, then the server. No reinstall, no reload — the fork's mem0
    # is already installed in the image.
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_DB_NAME=mem0_app
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}

  postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "128mb"
    networks:
      - mem0_network
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_db:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "8432:5432"

volumes:
  postgres_db:

networks:
  mem0_network:
    driver: bridge
